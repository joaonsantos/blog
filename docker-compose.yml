version: '3'

services:
  nginx-blog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nginx-blog
    networks:
      - app-network
    ports:
      - "80:80"
    volumes:
      - ./nginx-conf:/etc/nginx/conf.d
      - web-root:/usr/share/nginx/html
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    networks:
      - backend

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - web-root:/var/www/html
    networks:
      - backend
    depends_on:
      - nginx-blog
    command: certonly --webroot --webroot-path=/var/www/html --email joaopns05@gmail.com --agree-tos --no-eff-email --staging -d joaonsantos.dev  -d www.joaonsantos.dev

volumes:
  certbot-etc:
  certbot-var:
  web-root:

networks:
  backend:
